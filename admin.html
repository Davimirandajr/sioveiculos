<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Siow | Admin Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .tab-btn.active { border-bottom: 3px solid #f2c94c; color: #f2c94c; }
        .input-admin { background: #0a192f; border: 1px solid #1e293b; padding: 0.75rem; border-radius: 0.5rem; width: 100%; color: white; outline: none; font-size: 14px; }
        .input-admin:focus { border-color: #f2c94c; }
        .card-lead { background: rgba(255,255,255,0.03); border-left: 4px solid #f2c94c; }
        .tag-repasse { color: #f2c94c; font-weight: 900; }
        .tag-venda { color: #22c55e; font-weight: 900; }
        .hidden-auth { display: none !important; }
        .gold-text { color: #f2c94c; }
    </style>
</head>
<body class="pb-20">

    <section id="login-screen" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-[#0a192f] p-8 rounded-3xl border border-white/10 shadow-2xl text-center">
            <h2 class="text-2xl font-black uppercase italic mb-2">Siow <span class="text-[#f2c94c]">Gestor</span></h2>
            <p class="text-[10px] opacity-50 uppercase tracking-widest mb-8">Acesso restrito ao administrador</p>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="Seu e-mail do Firebase" class="input-admin">
                <input type="password" id="login-senha" placeholder="Sua senha" class="input-admin">
                <button id="btnLogin" class="w-full bg-[#f2c94c] text-black font-black py-4 rounded-xl uppercase hover:bg-yellow-500 transition">Entrar no Painel</button>
            </div>
        </div>
    </section>

    <div id="admin-content" class="hidden-auth">
        <header class="bg-[#0a192f] border-b border-white/5 p-6 sticky top-0 z-50 shadow-xl">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-[#f2c94c]">Siow Admin</h1>
                <button id="btnLogout" class="text-[10px] bg-red-600/10 text-red-500 px-4 py-2 rounded-lg font-bold uppercase border border-red-500/20 hover:bg-red-600 hover:text-white transition">Sair</button>
            </div>
        </header>

        <nav class="flex justify-center gap-8 bg-[#0a192f] border-b border-white/5 sticky top-[73px] z-40">
            <button onclick="switchTab('estoque')" id="btn-estoque" class="tab-btn active py-4 px-6 text-xs uppercase font-black tracking-widest">Estoque</button>
            <button onclick="switchTab('avaliacoes')" id="btn-avaliacoes" class="tab-btn py-4 px-6 text-xs uppercase font-black tracking-widest flex items-center gap-2">
                Avaliações <span id="countAv" class="bg-red-600 text-[9px] px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
        </nav>

        <main class="max-w-6xl mx-auto p-4 lg:p-10">
            
            <section id="tab-estoque">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="bg-white/5 p-6 rounded-2xl border border-white/10 shadow-2xl sticky top-40">
                            <h2 class="text-lg font-bold mb-6 italic border-b border-[#f2c94c] inline-block">Cadastrar Carro</h2>
                            <form id="formCadastro" class="space-y-4">
                                <input type="text" id="marca" placeholder="Marca" class="input-admin" required>
                                <input type="text" id="nome" placeholder="Nome" class="input-admin" required>
                                <input type="text" id="modelo" placeholder="Versão/Motor" class="input-admin" required>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="text" id="ano" placeholder="Ano (Ex: 22/23)" class="input-admin" required>
                                    <input type="number" id="km" placeholder="KM" class="input-admin" required>
                                </div>
                                <input type="text" id="preco" placeholder="Preço (Ex: 150.000)" class="input-admin" required>
                                <select id="tipo" class="input-admin" required>
                                    <option value="Venda">Venda Convencional</option>
                                    <option value="Repasse">Oportunidade Repasse</option>
                                </select>
                                <select id="garantia" class="input-admin">
                                    <option value="Sim">Com Garantia</option>
                                    <option value="Não">Sem Garantia</option>
                                </select>
                                <label class="flex items-center gap-2 text-xs font-bold uppercase text-orange-500 p-2 bg-orange-500/5 rounded border border-orange-500/20 cursor-pointer">
                                    <input type="checkbox" id="ofertaFogo"> Ativar Oferta 🔥
                                </label>
                                <div class="p-4 border-2 border-dashed border-white/10 rounded-xl text-center bg-black/20">
                                    <input type="file" id="fotos" multiple accept="image/*" class="text-[10px]" required>
                                </div>
                                <button type="submit" id="btnSalvar" class="w-full bg-[#f2c94c] text-black font-black py-4 rounded-xl uppercase hover:scale-105 transition">Publicar no Site</button>
                            </form>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <h3 class="text-sm font-black uppercase mb-6 opacity-40">Estoque Ativo</h3>
                        <div id="listaEstoque" class="space-y-4"></div>
                    </div>
                </div>
            </section>

            <section id="tab-avaliacoes" class="hidden">
                <h3 class="text-sm font-black uppercase mb-6 opacity-40">Clientes aguardando retorno</h3>
                <div id="listaLeads" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </section>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js";

   // Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBzPn8j2QqzMR3h7gP_Yj9Pq9AiqVevHbM",
  authDomain: "sio-veiculos-60042-493720.firebaseapp.com",
  projectId: "sio-veiculos-60042-493720", // O ID REAL QUE O GOOGLE GEROU
  storageBucket: "sio-veiculos-60042-493720.appspot.com",
  messagingSenderId: "759442322067",
  appId: "1:759442322067:web:48583775faa29f39489366"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- SISTEMA DE LOGIN ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden-auth');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden-auth');
            }
        });

        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            try {
                await signInWithEmailAndPassword(auth, email, senha);
            } catch (error) {
                alert("Erro: E-mail ou senha inválidos no Firebase Auth.");
            }
        };

        document.getElementById('btnLogout').onclick = () => signOut(auth);

        // --- NAVEGAÇÃO ---
        window.switchTab = (tab) => {
            document.getElementById('tab-estoque').classList.toggle('hidden', tab !== 'estoque');
            document.getElementById('tab-avaliacoes').classList.toggle('hidden', tab !== 'avaliacoes');
            document.getElementById('btn-estoque').classList.toggle('active', tab === 'estoque');
            document.getElementById('btn-avaliacoes').classList.toggle('active', tab === 'avaliacoes');
        };

        // --- CRUD ESTOQUE ---
        const form = document.getElementById('formCadastro');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const files = document.getElementById('fotos').files;
            btn.disabled = true; btn.innerText = "ENVIANDO FOTOS...";

            try {
                const urls = [];
                for(let file of files) {
                    const sRef = ref(storage, `estoque/${Date.now()}_${file.name}`);
                    await uploadBytes(sRef, file);
                    urls.push(await getDownloadURL(sRef));
                }

                await addDoc(collection(db, "estoque"), {
                    marca: document.getElementById('marca').value,
                    nome: document.getElementById('nome').value,
                    modelo: document.getElementById('modelo').value,
                    ano: document.getElementById('ano').value,
                    km: document.getElementById('km').value,
                    preco: document.getElementById('preco').value,
                    tipo: document.getElementById('tipo').value,
                    garantia: document.getElementById('garantia').value,
                    oferta: document.getElementById('ofertaFogo').checked,
                    imagens: urls,
                    criadoEm: new Date()
                });

                alert("Sucesso! Veículo está no ar.");
                form.reset();
            } catch (err) { alert("Erro ao salvar."); }
            btn.disabled = false; btn.innerText = "Publicar no Site";
        });

        onSnapshot(query(collection(db, "estoque"), orderBy("criadoEm", "desc")), (snapshot) => {
            const container = document.getElementById('listaEstoque');
            container.innerHTML = '';
            snapshot.forEach(vDoc => {
                const car = vDoc.data();
                container.innerHTML += `
                    <div class="bg-white/5 border border-white/10 p-4 rounded-xl flex flex-col md:flex-row gap-4 items-center">
                        <img src="${car.imagens[0]}" class="w-full md:w-32 h-24 object-cover rounded-lg">
                        <div class="flex-1 text-center md:text-left">
                            <h4 class="font-black italic uppercase text-sm">${car.oferta ? '🔥' : ''} ${car.marca} ${car.nome}</h4>
                            <p class="text-[10px] opacity-60 uppercase">${car.modelo} | ${car.ano} | ${car.km} KM</p>
                            <p class="text-xs ${car.tipo === 'Repasse' ? 'tag-repasse' : 'tag-venda'} mt-1 uppercase">${car.tipo} | Garantia: ${car.garantia}</p>
                            <p class="text-sm font-bold gold-text">R$ ${car.preco}</p>
                        </div>
                        <button onclick="deletarItem('estoque', '${vDoc.id}')" class="text-red-500 hover:bg-red-500/10 p-4 rounded-full transition">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>`;
            });
        });

        // --- LEADS DE AVALIAÇÃO ---
        onSnapshot(query(collection(db, "avaliacoes"), orderBy("dataEnvio", "desc")), (snapshot) => {
            const container = document.getElementById('listaLeads');
            const counter = document.getElementById('countAv');
            container.innerHTML = '';
            counter.innerText = snapshot.size;
            counter.classList.toggle('hidden', snapshot.size === 0);

            snapshot.forEach(aDoc => {
                const av = aDoc.data();
                let fotosHtml = '';
                if(av.fotos) av.fotos.forEach(img => {
                    fotosHtml += `<a href="${img}" target="_blank"><img src="${img}" class="w-16 h-16 object-cover rounded border border-white/10 hover:border-[#f2c94c] transition"></a>`;
                });

                container.innerHTML += `
                    <div class="card-lead p-6 rounded-2xl bg-white/5 shadow-xl">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-white uppercase text-lg">${av.veiculo}</h4>
                                <p class="text-[9px] text-[#f2c94c] font-black tracking-widest uppercase">Lead via WhatsApp: ${av.whatsapp}</p>
                            </div>
                            <span class="text-[9px] opacity-30">${av.dataEnvio || ''}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-[10px] uppercase opacity-70 mb-4 border-y border-white/5 py-4">
                            <p><span class="opacity-40">Ano:</span> ${av.ano}</p>
                            <p><span class="opacity-40">KM:</span> ${av.km}</p>
                            <p><span class="opacity-40">IPVA:</span> ${av.ipva}</p>
                            <p><span class="opacity-40">Doc:</span> ${av.documentacao}</p>
                        </div>
                        <p class="text-[10px] mb-4 italic opacity-80 bg-black/30 p-2 rounded">"${av.detalhes || 'Sem detalhes informados'}"</p>
                        <div class="flex flex-wrap gap-2 mb-6">${fotosHtml}</div>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${av.whatsapp.replace(/\D/g,'')}" target="_blank" class="flex-1 bg-green-600 text-center py-3 rounded-lg font-black text-xs uppercase hover:bg-green-500 transition">Responder</a>
                            <button onclick="deletarItem('avaliacoes', '${aDoc.id}')" class="bg-white/5 px-5 rounded-lg hover:bg-red-600/20 text-red-500 border border-white/10 transition">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </div>`;
            });
        });

        // --- GLOBAL DELETE ---
        window.deletarItem = async (col, id) => {
            if(confirm("Tem certeza que deseja apagar esse registro?")) {
                try {
                    await deleteDoc(doc(db, col, id));
                } catch (e) { alert("Erro ao excluir."); }
            }
        };

    </script>
</body>
</html>
