<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Siow | Admin Firestore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; }
        .tab-btn.active { border-bottom: 3px solid #f2c94c; color: #f2c94c; }
        .input-admin { background: #0a192f; border: 1px solid #1e293b; padding: 0.75rem; border-radius: 0.5rem; width: 100%; color: white; outline: none; font-size: 14px; }
        .input-admin:focus { border-color: #f2c94c; }
        .card-lead { background: rgba(255,255,255,0.03); border-left: 4px solid #f2c94c; }
        .hidden-auth { display: none !important; }
        .gold-text { color: #f2c94c; }
    </style>
</head>
<body class="pb-20">

    <section id="login-screen" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-[#0a192f] p-8 rounded-3xl border border-white/10 shadow-2xl text-center">
            <h2 class="text-2xl font-black uppercase italic mb-2">Siow <span class="text-[#f2c94c]">Gestor</span></h2>
            <p class="text-[10px] opacity-50 uppercase tracking-widest mb-8">Armazenamento via Firestore (Plano Free)</p>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="E-mail" class="input-admin">
                <input type="password" id="login-senha" placeholder="Senha" class="input-admin">
                <button id="btnLogin" class="w-full bg-[#f2c94c] text-black font-black py-4 rounded-xl hover:bg-yellow-500 transition">ENTRAR</button>
            </div>
        </div>
    </section>

    <div id="admin-content" class="hidden-auth">
        <header class="bg-[#0a192f] border-b border-white/5 p-6 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-black italic text-[#f2c94c]">SIOW ADMIN</h1>
                <button id="btnLogout" class="text-[10px] bg-red-600/10 text-red-500 px-4 py-2 rounded-lg font-bold border border-red-500/20">SAIR</button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 lg:p-10">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <form id="formCadastro" class="bg-white/5 p-6 rounded-2xl border border-white/10 space-y-4">
                        <h2 class="font-bold border-b border-[#f2c94c] pb-2">Novo Veículo</h2>
                        <input type="text" id="marca" placeholder="Marca" class="input-admin" required>
                        <input type="text" id="nome" placeholder="Nome do Carro" class="input-admin" required>
                        <input type="text" id="preco" placeholder="Preço (Ex: 89.900)" class="input-admin" required>
                        <input type="text" id="modelo" placeholder="Versão/Motor" class="input-admin" required>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="ano" placeholder="Ano" class="input-admin" required>
                            <input type="number" id="km" placeholder="KM" class="input-admin" required>
                        </div>
                        <select id="tipo" class="input-admin">
                            <option value="Venda">Venda</option>
                            <option value="Repasse">Repasse</option>
                        </select>
                        <div class="p-4 border-2 border-dashed border-white/10 rounded-xl bg-black/20 text-center">
                            <p class="text-[10px] mb-2 opacity-50">FOTOS (MAX 3 - OTIMIZADAS)</p>
                            <input type="file" id="fotos" multiple accept="image/*" class="text-[10px]">
                        </div>
                        <button type="submit" id="btnSalvar" class="w-full bg-[#f2c94c] text-black font-black py-4 rounded-xl uppercase">Publicar</button>
                    </form>
                </div>

                <div class="lg:col-span-2">
                    <h3 class="text-xs font-black opacity-40 mb-4 uppercase">Estoque no Firestore</h3>
                    <div id="listaEstoque" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUXJgUdYaQIEKvsW2dvqN5SQNyJ-MY2v0",
            authDomain: "sio-veiculos-sio.firebaseapp.com",
            projectId: "sio-veiculos-sio",
            storageBucket: "sio-veiculos-sio.firebasestorage.app",
            messagingSenderId: "311148657897",
            appId: "1:311148657897:web:9ad306adefab834a8c4478",
            measurementId: "G-NDL3R8PMEK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- FUNÇÃO PARA COMPRIMIR IMAGEM (BASE64) ---
        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // Redimensiona para economizar espaço no Firestore
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        // Exporta como string Base64 com qualidade 0.7 (70%)
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        // 🔐 LOGIN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden-auth');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden-auth');
            }
        });

        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            try { await signInWithEmailAndPassword(auth, email, senha); } 
            catch (e) { alert("Erro de login."); }
        };

        document.getElementById('btnLogout').onclick = () => signOut(auth);

        // 🚗 SALVAR NO FIRESTORE
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const files = document.getElementById('fotos').files;
            
            btn.disabled = true;
            btn.innerText = "PROCESSANDO IMAGENS...";

            try {
                const base64Images = [];
                for (let file of files) {
                    const compressed = await compressImage(file);
                    base64Images.push(compressed);
                }

                await addDoc(collection(db, "estoque"), {
                    marca: document.getElementById('marca').value,
                    nome: document.getElementById('nome').value,
                    preco: document.getElementById('preco').value,
                    modelo: document.getElementById('modelo').value,
                    ano: document.getElementById('ano').value,
                    km: document.getElementById('km').value,
                    tipo: document.getElementById('tipo').value,
                    imagens: base64Images, // Aqui as imagens entram como TEXTO
                    criadoEm: new Date()
                });

                alert("Sucesso! Salvo no Firestore.");
                e.target.reset();
            } catch (err) {
                console.error(err);
                alert("Erro ao salvar. Verifique o tamanho das fotos.");
            }
            btn.disabled = false;
            btn.innerText = "Publicar";
        });

        // 📦 LISTAGEM
        onSnapshot(query(collection(db, "estoque"), orderBy("criadoEm", "desc")), (snapshot) => {
            const container = document.getElementById('listaEstoque');
            container.innerHTML = '';
            snapshot.forEach(vDoc => {
                const car = vDoc.data();
                container.innerHTML += `
                <div class="bg-white/5 border border-white/10 p-4 rounded-xl flex gap-4 items-center">
                    <img src="${car.imagens[0]}" class="w-24 h-20 object-cover rounded shadow-lg">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm uppercase">${car.marca} ${car.nome}</h4>
                        <p class="text-[10px] opacity-50 italic">R$ ${car.preco} | ${car.ano}</p>
                    </div>
                    <button onclick="deletarItem('estoque', '${vDoc.id}')" class="text-red-500 p-2">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>`;
            });
        });

        window.deletarItem = async (col, id) => {
            if (confirm("Excluir carro?")) await deleteDoc(doc(db, col, id));
        };
    </script>
</body>
</html>
