<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Siow Veículos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; }
        .form-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 2rem; }
        .input-admin { background: #0a192f; border: 1px solid #1e293b; padding: 0.75rem; border-radius: 0.5rem; width: 100%; color: white; outline: none; }
        .input-admin:focus { border-color: #f2c94c; }
        .btn-add { background: #f2c94c; color: black; font-weight: 800; padding: 1rem; border-radius: 0.5rem; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-add:hover { background: #ffd700; transform: scale(1.02); }
    </style>
</head>
<body class="p-6 lg:p-20">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic uppercase">Painel <span class="text-[#f2c94c]">Gestor</span></h1>
            <a href="index.html" class="text-xs uppercase font-bold border-b border-[#f2c94c] pb-1">Ver Site Inicial</a>
        </div>

        <div class="form-card mb-12 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fa fa-car text-[#f2c94c]"></i> Cadastrar Novo Veículo
            </h2>
            <form id="formCadastro" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nome" placeholder="Nome do Carro (Ex: BMW M3 Competition)" class="input-admin md:col-span-2" required>
                
                <input type="text" id="preco" placeholder="Preço (Ex: 450.000,00)" class="input-admin" required>
                <input type="text" id="ano" placeholder="Ano (Ex: 2023/2024)" class="input-admin" required>
                
                <input type="number" id="km" placeholder="KM Atual" class="input-admin" required>
                <select id="tipo" class="input-admin" required>
                    <option value="Venda">Venda Convencional</option>
                    <option value="Repasse">Oportunidade Repasse</option>
                </select>

                <div class="md:col-span-2 p-6 border-2 border-dashed border-white/10 rounded-xl text-center bg-black/20">
                    <p class="text-xs font-bold uppercase text-gray-400 mb-2">Fotos do Veículo (Selecione várias)</p>
                    <input type="file" id="fotos" multiple accept="image/*" class="text-xs cursor-pointer" required>
                </div>

                <button type="submit" id="btnSalvar" class="btn-add md:col-span-2 uppercase">Publicar no Estoque</button>
            </form>
        </div>

        <h2 class="text-xl font-bold mb-6">Veículos Ativos</h2>
        <div id="listaEstoque" class="grid gap-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1RhHfkUK4XDsIJCfQlBzP0xbFiE_tTcQ",
            authDomain: "sio-veiculos.firebaseapp.com",
            projectId: "sio-veiculos",
            storageBucket: "sio-veiculos.firebasestorage.app",
            messagingSenderId: "929393486658",
            appId: "1:929393486658:web:b8587757c9e6e29a20f6db"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const form = document.getElementById('formCadastro');
        const btn = document.getElementById('btnSalvar');

        // --- SALVAR VEÍCULO ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const files = document.getElementById('fotos').files;
            
            if(files.length === 0) return alert("Selecione pelo menos uma foto!");

            btn.disabled = true;
            btn.innerText = "SUBINDO FOTOS... AGUARDE";

            try {
                const urlsImagens = [];
                
                // Upload de cada foto para o Storage
                for(let file of files) {
                    const storageRef = ref(storage, `estoque/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(storageRef);
                    urlsImagens.push(url);
                }

                // Salva os dados no Firestore
                await addDoc(collection(db, "estoque"), {
                    nome: document.getElementById('nome').value,
                    preco: document.getElementById('preco').value,
                    ano: document.getElementById('ano').value,
                    km: document.getElementById('km').value,
                    tipo: document.getElementById('tipo').value,
                    imagens: urlsImagens,
                    criadoEm: new Date()
                });

                alert("Veículo cadastrado com sucesso!");
                form.reset();
            } catch (error) {
                console.error(error);
                alert("Erro ao cadastrar.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Publicar no Estoque";
            }
        });

        // --- LISTAR E DELETAR ---
        onSnapshot(query(collection(db, "estoque"), orderBy("criadoEm", "desc")), (snapshot) => {
            const container = document.getElementById('listaEstoque');
            container.innerHTML = '';
            
            snapshot.forEach(vDoc => {
                const car = vDoc.data();
                container.innerHTML += `
                    <div class="flex items-center justify-between bg-white/5 p-4 rounded-lg border border-white/5">
                        <div class="flex items-center gap-4">
                            <img src="${car.imagens[0]}" class="w-16 h-16 object-cover rounded">
                            <div>
                                <h4 class="font-bold text-sm">${car.nome}</h4>
                                <p class="text-[10px] text-gray-500 uppercase">${car.tipo} | R$ ${car.preco}</p>
                            </div>
                        </div>
                        <button onclick="deletarCarro('${vDoc.id}')" class="text-red-500 hover:text-red-400 p-2">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                `;
            });
        });

        window.deletarCarro = async (id) => {
            if(confirm("Deseja remover este veículo do estoque?")) {
                await deleteDoc(doc(db, "estoque", id));
            }
        };
    </script>
</body>
</html>
