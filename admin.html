<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Siow | Admin</title>
    <script>
        (function() {
            const senhaMestra = "1234"; // COLOQUE SUA SENHA AQUI
            if (!sessionStorage.getItem('siow_auth')) {
                let tentativa = prompt("Acesso Restrito - Digite a Senha:");
                if (tentativa === senhaMestra) {
                    sessionStorage.setItem('siow_auth', 'true');
                } else {
                    alert("Senha Incorreta!");
                    window.location.href = 'index.html';
                }
            }
        })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; }
        .tab-btn.active { border-bottom: 3px solid #f2c94c; color: #f2c94c; }
        .input-admin { background: #0a192f; border: 1px solid #1e293b; padding: 0.75rem; border-radius: 0.5rem; width: 100%; color: white; outline: none; font-size: 14px; }
        .input-admin:focus { border-color: #f2c94c; }
        .card-lead { background: rgba(255,255,255,0.03); border-left: 4px solid #f2c94c; transition: 0.3s; }
        .tag-repasse { color: #f2c94c; font-weight: 900; }
        .tag-venda { color: #22c55e; font-weight: 900; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-[#0a192f] border-b border-white/5 p-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Siow <span class="text-[#f2c94c]">Gestor</span></h1>
            <button onclick="logout()" class="text-[10px] bg-red-600/10 text-red-500 px-3 py-2 rounded uppercase font-bold border border-red-500/20 hover:bg-red-600 hover:text-white transition">Sair do Painel</button>
        </div>
    </header>

    <nav class="flex justify-center gap-8 bg-[#0a192f] border-b border-white/5 overflow-x-auto hide-scroll">
        <button onclick="switchTab('estoque')" id="btn-estoque" class="tab-btn active py-4 px-6 text-xs uppercase font-black tracking-widest">Estoque</button>
        <button onclick="switchTab('avaliacoes')" id="btn-avaliacoes" class="tab-btn py-4 px-6 text-xs uppercase font-black tracking-widest flex items-center gap-2">
            Avaliações <span id="countAv" class="bg-red-600 text-[9px] px-1.5 py-0.5 rounded-full hidden">0</span>
        </button>
    </nav>

    <main class="max-w-6xl mx-auto p-4 lg:p-10">
        
        <section id="tab-estoque">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="bg-white/5 p-6 rounded-2xl border border-white/10 shadow-2xl sticky top-28">
                        <h2 class="text-lg font-bold mb-6 italic underline decoration-[#f2c94c]">Novo Veículo</h2>
                        <form id="formCadastro" class="space-y-4">
                            <input type="text" id="marca" placeholder="Marca (Ex: BMW)" class="input-admin" required>
                            <input type="text" id="nome" placeholder="Nome (Ex: X6 M)" class="input-admin" required>
                            <input type="text" id="modelo" placeholder="Versão (Ex: 4.4 V8 Biturbo)" class="input-admin" required>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" id="ano" placeholder="Ano (23/24)" class="input-admin" required>
                                <input type="number" id="km" placeholder="KM" class="input-admin" required>
                            </div>
                            
                            <input type="text" id="preco" placeholder="Preço (Ex: 850.000)" class="input-admin" required>
                            
                            <select id="tipo" class="input-admin" required>
                                <option value="Venda">Venda Convencional</option>
                                <option value="Repasse">Oportunidade Repasse</option>
                            </select>

                            <select id="garantia" class="input-admin">
                                <option value="Sim">Com Garantia</option>
                                <option value="Não">Sem Garantia (Repasse)</option>
                            </select>

                            <label class="flex items-center gap-2 text-xs font-bold uppercase text-orange-500 cursor-pointer p-2 bg-orange-500/5 rounded border border-orange-500/20">
                                <input type="checkbox" id="ofertaFogo"> Ativar Oferta 🔥
                            </label>

                            <div class="p-4 border-2 border-dashed border-white/10 rounded-xl text-center">
                                <input type="file" id="fotos" multiple accept="image/*" class="text-[10px]" required>
                            </div>

                            <button type="submit" id="btnSalvar" class="w-full bg-[#f2c94c] text-black font-black py-4 rounded-xl uppercase hover:scale-105 transition shadow-lg shadow-yellow-500/10">Publicar Agora</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <h3 class="text-sm font-black uppercase mb-6 opacity-50 tracking-widest">Veículos Publicados</h3>
                    <div id="listaEstoque" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <section id="tab-avaliacoes" class="hidden">
            <h3 class="text-sm font-black uppercase mb-6 opacity-50 tracking-widest text-center lg:text-left text-[#f2c94c]">Leads de Avaliação</h3>
            <div id="listaLeads" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

    </main>

    <script type="module">
        // LOGOUT
        window.logout = () => {
            sessionStorage.removeItem('siow_auth');
            window.location.href = 'index.html';
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1RhHfkUK4XDsIJCfQlBzP0xbFiE_tTcQ",
            authDomain: "sio-veiculos.firebaseapp.com",
            projectId: "sio-veiculos",
            storageBucket: "sio-veiculos.firebasestorage.app",
            messagingSenderId: "929393486658",
            appId: "1:929393486658:web:b8587757c9e6e29a20f6db"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.switchTab = (tab) => {
            document.getElementById('tab-estoque').classList.toggle('hidden', tab !== 'estoque');
            document.getElementById('tab-avaliacoes').classList.toggle('hidden', tab !== 'avaliacoes');
            document.getElementById('btn-estoque').classList.toggle('active', tab === 'estoque');
            document.getElementById('btn-avaliacoes').classList.toggle('active', tab === 'avaliacoes');
        };

        const form = document.getElementById('formCadastro');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const files = document.getElementById('fotos').files;
            btn.disabled = true; btn.innerText = "ENVIANDO IMAGENS...";

            try {
                const urls = [];
                for(let file of files) {
                    const sRef = ref(storage, `estoque/${Date.now()}_${file.name}`);
                    await uploadBytes(sRef, file);
                    urls.push(await getDownloadURL(sRef));
                }
                await addDoc(collection(db, "estoque"), {
                    marca: document.getElementById('marca').value,
                    nome: document.getElementById('nome').value,
                    modelo: document.getElementById('modelo').value,
                    ano: document.getElementById('ano').value,
                    km: document.getElementById('km').value,
                    preco: document.getElementById('preco').value,
                    tipo: document.getElementById('tipo').value,
                    garantia: document.getElementById('garantia').value,
                    oferta: document.getElementById('ofertaFogo').checked,
                    imagens: urls,
                    criadoEm: new Date()
                });
                alert("Veículo Publicado!");
                form.reset();
            } catch (err) { alert("Erro ao salvar."); }
            btn.disabled = false; btn.innerText = "Publicar Agora";
        });

        onSnapshot(query(collection(db, "estoque"), orderBy("criadoEm", "desc")), (snapshot) => {
            const container = document.getElementById('listaEstoque');
            container.innerHTML = '';
            snapshot.forEach(vDoc => {
                const car = vDoc.data();
                container.innerHTML += `
                    <div class="bg-white/5 border border-white/10 p-4 rounded-xl flex flex-col md:flex-row gap-4 items-center">
                        <img src="${car.imagens[0]}" class="w-full md:w-32 h-24 object-cover rounded-lg">
                        <div class="flex-1 text-center md:text-left">
                            <h4 class="font-black italic uppercase text-sm">${car.oferta ? '🔥' : ''} ${car.marca} ${car.nome}</h4>
                            <p class="text-[10px] opacity-60">${car.modelo} | ${car.ano}</p>
                            <p class="text-xs ${car.tipo === 'Repasse' ? 'tag-repasse' : 'tag-venda'} mt-1 uppercase">${car.tipo}</p>
                            <p class="text-sm font-bold gold-text">R$ ${car.preco}</p>
                        </div>
                        <button onclick="deletarItem('estoque', '${vDoc.id}')" class="text-red-500 p-4"><i class="fa fa-trash"></i></button>
                    </div>`;
            });
        });

        onSnapshot(query(collection(db, "avaliacoes"), orderBy("dataEnvio", "desc")), (snapshot) => {
            const container = document.getElementById('listaLeads');
            const counter = document.getElementById('countAv');
            container.innerHTML = '';
            counter.innerText = snapshot.size;
            counter.classList.toggle('hidden', snapshot.size === 0);

            snapshot.forEach(aDoc => {
                const av = aDoc.data();
                let fotosHtml = '';
                if(av.fotos) av.fotos.forEach(img => {
                    fotosHtml += `<a href="${img}" target="_blank"><img src="${img}" class="w-12 h-12 object-cover rounded border border-white/10"></a>`;
                });

                container.innerHTML += `
                    <div class="card-lead p-6 rounded-2xl">
                        <div class="flex justify-between mb-4">
                            <span class="text-[9px] bg-[#f2c94c] text-black font-black px-2 py-1 rounded">CLIENTE: ${av.whatsapp}</span>
                        </div>
                        <h4 class="font-bold text-white mb-2 uppercase">${av.veiculo} (${av.ano})</h4>
                        <div class="grid grid-cols-2 gap-2 text-[10px] uppercase opacity-70 mb-4">
                            <p>IPVA: ${av.ipva}</p>
                            <p>Doc: ${av.documentacao}</p>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-4">${fotosHtml}</div>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${av.whatsapp.replace(/\D/g,'')}" target="_blank" class="flex-1 bg-green-600 text-center py-2 rounded font-black text-[10px] uppercase">Responder</a>
                            <button onclick="deletarItem('avaliacoes', '${aDoc.id}')" class="bg-red-500/20 text-red-500 px-4 rounded"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });

        window.deletarItem = async (col, id) => {
            if(confirm("Excluir?")) await deleteDoc(doc(db, col, id));
        };
    </script>
</body>
</html>
