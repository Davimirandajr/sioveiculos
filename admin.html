<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siow Veículos | Painel Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --siow-gold: #f2c94c; }
        body { font-family: 'Montserrat', sans-serif; background: #020617; color: white; }
        .gold-text { color: var(--siow-gold); }
        .gold-bg { background-color: var(--siow-gold); }
        .card-admin { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .form-input { background: #0f172a; border: 1px solid #1e293b; padding: 0.75rem; border-radius: 0.5rem; width: 100%; color: white; outline: none; }
        .form-input:focus { border-color: var(--siow-gold); }
        #loginPage { background: radial-gradient(circle at center, #0a192f 0%, #020617 100%); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full card-admin p-10 rounded-3xl shadow-2xl border-t-4 border-[#f2c94c]">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black uppercase italic">Siow <span class="gold-text">Auth</span></h2>
                <p class="text-gray-500 text-[10px] uppercase tracking-widest mt-2">Acesso Administrativo</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="emailInput" class="form-input" placeholder="E-mail (criado no Firebase)" required>
                <input type="password" id="passInput" class="form-input" placeholder="Sua Senha" required>
                <button type="submit" class="w-full gold-bg text-black font-black py-4 rounded uppercase hover:brightness-110 transition">Entrar</button>
            </form>
            <p id="errorMsg" class="text-red-500 text-[10px] text-center mt-4 font-bold hidden uppercase italic">Erro ao acessar. Verifique os dados.</p>
        </div>
    </div>

    <div id="adminPanel" class="hidden p-6 lg:p-12">
        <div class="max-w-7xl mx-auto">
            <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
                <h1 class="text-3xl font-black italic uppercase italic">Painel <span class="gold-text">Siow</span></h1>
                <button id="btnSair" class="text-[10px] border border-red-500/50 text-red-500 px-4 py-2 rounded uppercase font-bold hover:bg-red-500 hover:text-white transition">Sair</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="card-admin p-6 rounded-2xl border-l-4 border-[#f2c94c]">
                        <h2 class="font-bold mb-6 uppercase text-sm italic">Novo Veículo</h2>
                        <form id="formEstoque" class="space-y-3">
                            <input type="text" id="carNome" placeholder="Modelo" class="form-input text-xs" required>
                            <input type="text" id="carPreco" placeholder="Preço" class="form-input text-xs" required>
                            <input type="text" id="carImagem" placeholder="URL da Imagem" class="form-input text-xs" required>
                            <button type="submit" class="w-full gold-bg text-black font-bold py-3 rounded text-xs uppercase">Publicar</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <h2 class="text-xs font-black mb-6 uppercase tracking-widest opacity-50">Atividades Recentes</h2>
                    <div id="listaGeral" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Configuração conforme sua imagem do console
        const firebaseConfig = {
            apiKey: "AIzaSyD1RhHfkUK4XDsIJCfQlBzP0xbFiE_tTcQ",
            authDomain: "sio-veiculos.firebaseapp.com",
            projectId: "sio-veiculos",
            storageBucket: "sio-veiculos.firebasestorage.app",
            messagingSenderId: "929393486658",
            appId: "1:929393486658:web:b8587757c9e6e29a20f6db"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CONTROLE DE ACESSO ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                carregarDados();
            } else {
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
            }
        });

        // --- AÇÃO DE LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });

        // --- AÇÃO DE SAIR ---
        document.getElementById('btnSair').addEventListener('click', () => signOut(auth));

        // --- CARREGAR DADOS DO BANCO ---
        function carregarDados() {
            onSnapshot(collection(db, "avaliacoes"), (snap) => {
                const list = document.getElementById('listaGeral');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="card-admin p-4 rounded-xl border-l-2 border-green-500">
                            <p class="text-[10px] gold-text font-bold uppercase italic">${data.veiculo}</p>
                            <p class="text-xs">Interessado: ${data.whatsapp}</p>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
